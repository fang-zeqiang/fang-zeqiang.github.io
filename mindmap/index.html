function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderApp() {
  const { meta, branches, timeline, quote, quoteSub, sourceUrl } = MINDMAP_DATA;
  document.getElementById('app').innerHTML = `
    ${renderNav(meta, branches)}
    ${renderHero(meta)}
    ${renderChautauqua(meta.chautauqua)}
    ${renderBranches(branches)}
    ${renderTimeline(timeline)}
    ${renderFooter(quote, quoteSub, sourceUrl)}
  `;
  initInteractions();
  initScrollObserver();
  initNavScroll();
}

function renderNav(meta, branches) {
  const pills = branches.map(b =>
    `<button class="nav-pill ${b.status === 'active' ? 'active' : ''}"
            style="${b.status === 'active' ? `background:${b.color};border-color:${b.color}` : ''}"
            onclick="scrollToBranch('${b.id}')"
            title="分支${b.number}：${esc(b.title)}">${b.number}</button>`
  ).join('');
  return `
    <nav class="nav" id="main-nav">
      <div class="nav-inner">
        <span class="nav-title">${esc(meta.title)}</span>
        <div class="nav-pills">${pills}</div>
      </div>
    </nav>`;
}

function renderHero(meta) {
  return `
    <header class="hero">
      <div class="status-badge animate-in">
        <span class="status-dot"></span>
        ${esc(meta.status)} · ${esc(meta.statusDetail)}
      </div>
      <h1 class="hero-title animate-in">${esc(meta.title)}</h1>
      <div class="core-question-card animate-in">
        <p class="core-question">${esc(meta.coreQuestion)}</p>
        <p class="core-question-en">${esc(meta.coreQuestionEn)}</p>
      </div>
      <p class="hero-meta animate-in">${esc(meta.buildMethod)} · 起始于 ${esc(meta.startDate)}</p>
    </header>`;
}

function renderChautauqua(ch) {
  if (!ch) return '';
  return `
    <section class="chautauqua">
      <div class="chautauqua-inner animate-in">
        <div class="chautauqua-symbol">· · ·</div>
        <p class="chautauqua-title">${esc(ch.title)}</p>
        <p class="chautauqua-en">${esc(ch.en)}</p>
        <p class="chautauqua-desc">${esc(ch.description)}</p>
        <p class="chautauqua-source">— ${esc(ch.source)}</p>
      </div>
    </section>`;
}

function renderBranches(branches) {
  const items = branches.map((b, i) => renderBranch(b, i)).join('');
  return `
    <section class="branches-section">
      <p class="section-label animate-in">知识分支</p>
      <div class="branches-list">${items}</div>
    </section>`;
}

function renderBranch(b, index) {
  const isPending = b.status === 'pending';
  const nodeCount = b.nodes.length;
  const tagClass = isPending ? 'pending' : 'active';
  const tagText = isPending ? '待对谈填充' : `${nodeCount} 个节点`;
  const tagStyle = !isPending ? `background:${b.color}` : '';
  const nodesHtml = b.nodes.map(n => renderNode(n, b.color)).join('');

  return `
    <div class="branch ${isPending ? 'pending' : ''} animate-in stagger-${index + 1}"
         id="${b.id}" style="--branch-color:${b.color}">
      <button class="branch-header" ${isPending ? 'disabled' : ''}>
        <span class="branch-icon">${b.icon}</span>
        <span class="branch-label">分支${b.number}：${esc(b.title)}</span>
        <span class="branch-tag ${tagClass}" style="${tagStyle}">${tagText}</span>
        <span class="branch-chevron">›</span>
      </button>
      <div class="branch-content">
        <div class="branch-content-inner">
          <div class="nodes-wrapper">${nodesHtml}</div>
        </div>
      </div>
    </div>`;
}

function renderNode(node, branchColor) {
  const subtitle = node.subtitle ? `<p class="node-subtitle">${esc(node.subtitle)}</p>` : '';
  const questionPreview = node.question ? `<p class="node-question-preview">${esc(node.question)}</p>` : '';

  let detailHtml = '';
  if (node.question) {
    detailHtml += `<div class="question-banner"><strong>核心问题：</strong>${esc(node.question)}</div>`;
  }
  if (node.definition) {
    detailHtml += `<div class="definition">${esc(node.definition)}</div>`;
  }
  if (node.sections) {
    detailHtml += node.sections.map(s => renderSection(s)).join('');
  }
  if (node.evaluation) {
    detailHtml += renderEvaluation(node.evaluation);
  }
  if (node.references && node.references.length > 0) {
    detailHtml += renderReferences(node.references);
  }

  return `
    <div class="node-card">
      <div class="node-header">
        <span class="node-id">${esc(node.id)}</span>
        <div class="node-title-group">
          <p class="node-title">${esc(node.title)}</p>
          ${subtitle}
          ${questionPreview}
        </div>
        <span class="node-chevron">›</span>
      </div>
      <div class="node-content">
        <div class="node-content-inner">
          <div class="node-detail">${detailHtml}</div>
        </div>
      </div>
    </div>`;
}

function renderSection(section) {
  let inner = '';
  switch (section.type) {
    case 'table':
      inner = renderTable(section.content);
      break;
    case 'list':
      inner = renderList(section.content, false);
      break;
    case 'orderedList':
      inner = renderList(section.content, true);
      break;
    case 'text':
      inner = `<p class="narrative-text">${esc(section.content)}</p>`;
      break;
    case 'diagram':
      inner = `<pre class="diagram-block">${esc(section.content)}</pre>`;
      break;
    case 'quote':
      inner = renderQuote(section.content);
      break;
    case 'narrative':
      inner = renderNarrative(section.content);
      break;
    default:
      inner = `<p>${esc(String(section.content))}</p>`;
  }
  return `
    <div class="content-section">
      <p class="section-title">${esc(section.title)}</p>
      ${inner}
    </div>`;
}

function renderTable(data) {
  const ths = data.headers.map(h => `<th>${esc(h)}</th>`).join('');
  const rows = data.rows.map(row =>
    `<tr>${row.map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`
  ).join('');
  return `<table class="data-table"><thead><tr>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
}

function renderList(items, ordered) {
  const tag = ordered ? 'ol' : 'ul';
  const lis = items.map(item => `<li>${esc(item)}</li>`).join('');
  return `<${tag} class="content-list">${lis}</${tag}>`;
}

function renderQuote(data) {
  const attr = data.attribution ? `<p class="quote-attr">— ${esc(data.attribution)}</p>` : '';
  return `<div class="quote-block"><p class="quote-text">${esc(data.text)}</p>${attr}</div>`;
}

function renderNarrative(blocks) {
  return blocks.map(block => {
    switch (block.type) {
      case 'subtitle':
        return `<p class="narrative-subtitle">${esc(block.text)}</p>`;
      case 'text':
        return `<p class="narrative-text">${esc(block.text)}</p>`;
      case 'quote':
        return renderQuote({ text: block.text, attribution: block.attribution });
      case 'list':
        return renderList(block.items, false);
      default:
        return '';
    }
  }).join('');
}

function renderEvaluation(ev) {
  const pros = ev.pros.map(p => `<div>${esc(p)}</div>`).join('');
  const cons = ev.cons.map(c => `<div>${esc(c)}</div>`).join('');
  return `
    <div class="content-section">
      <p class="section-title">评价维度</p>
      <div class="eval-grid">
        <div class="eval-card pro"><p class="eval-label">✓ 正面</p>${pros}</div>
        <div class="eval-card con"><p class="eval-label">✗ 反面</p>${cons}</div>
      </div>
    </div>`;
}

function renderReferences(refs) {
  const items = refs.map(r =>
    `<p class="ref-item">${esc(r.author)} (${r.year}). <em>${esc(r.title)}</em></p>`
  ).join('');
  return `<div class="references"><p class="references-title">参考文献</p>${items}</div>`;
}

function renderTimeline(timeline) {
  const rows = timeline.map(t =>
    `<tr><td class="date-cell">${esc(t.date)}</td><td>${esc(t.topic)}</td><td style="color:var(--text-tertiary);font-family:var(--font-mono);font-size:12px">${esc(t.nodeId)}</td></tr>`
  ).join('');
  return `
    <section class="timeline-section">
      <p class="section-label animate-in">对谈记录</p>
      <table class="timeline-table animate-in">
        <thead><tr><th>日期</th><th>主题</th><th>节点</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </section>`;
}

function renderFooter(quote, sub, url) {
  return `
    <footer class="site-footer">
      <div class="footer-divider"></div>
      <p class="footer-quote animate-in">「${esc(quote)}」</p>
      <p class="footer-sub animate-in">${esc(sub)}</p>
      <p class="footer-source animate-in">
        本思维导图持续更新中，通过对谈逐步扩展 ·
        <a href="${esc(url)}" target="_blank" rel="noopener">原文链接</a>
      </p>
    </footer>`;
}

function initInteractions() {
  document.addEventListener('click', (e) => {
    const branchBtn = e.target.closest('.branch:not(.pending) .branch-header');
    if (branchBtn) {
      branchBtn.closest('.branch').classList.toggle('open');
      return;
    }
    const nodeBtn = e.target.closest('.node-header');
    if (nodeBtn) {
      nodeBtn.closest('.node-card').classList.toggle('open');
      return;
    }
  });
}

function scrollToBranch(id) {
  const el = document.getElementById(id);
  if (el) {
    const y = el.getBoundingClientRect().top + window.scrollY - 72;
    window.scrollTo({ top: y, behavior: 'smooth' });
    setTimeout(() => {
      if (!el.classList.contains('open') && !el.classList.contains('pending')) {
        el.classList.add('open');
      }
    }, 400);
  }
}

function initScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -32px 0px' });
  document.querySelectorAll('.animate-in').forEach(el => observer.observe(el));
}

function initNavScroll() {
  const nav = document.getElementById('main-nav');
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        nav.classList.toggle('scrolled', window.scrollY > 16);
        ticking = false;
      });
      ticking = true;
    }
  });
}

document.addEventListener('DOMContentLoaded', renderApp);
</script>

</body>
</html>
